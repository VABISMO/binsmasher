name: CI/CD - BinSmasher (Cryptocalypse)

on:
  push:
    branches: [ main ]
    tags: [ 'cryptocalypse-*' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-22.04, ubuntu-24.04 ]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3 python3-pip python3-venv \
            gcc build-essential \
            gdb binutils \
            netcat-openbsd \
            checksec \
            iproute2 \
            git \
            pkg-config

      - name: Install radare2 from official source (recommended method)
        run: |
          echo "=== Installing radare2 from Git repository ==="
          git clone --depth 1 https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          chmod +x sys/install.sh
          ./sys/install.sh
          cd /tmp
          rm -rf radare2
          echo "=== radare2 installation completed ==="
          r2 -v || echo "WARNING: r2 command not found"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Create virtual environment and install packages
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit

      - name: Lint code with Ruff
        run: |
          source .venv/bin/activate
          ruff check src/ tests/ --output-format=github

      - name: Security scan with Bandit
        run: |
          source .venv/bin/activate
          bandit -r src/ -c high -f txt --severity-level high

      - name: Compile test binaries
        run: |
          cd tests/src
          make clean
          make
          ls -la ../bins/

      - name: Debug – Check listening ports before test suite
        run: |
          echo "=== Listening ports before running test suite ==="
          ss -tuln | grep -E '1444[0-9]' || echo "No ports in range 1444x are listening (expected)"

      - name: Grace period for server startup in CI
        run: sleep 3

      - name: Run full test suite
        run: |
          source .venv/bin/activate
          python3 tests/test_suite.py

      - name: Summary
        if: always()
        run: |
          echo "✅ Pipeline completed on ${{ matrix.os }}"
          echo "Expected result: PASS 60+ | FAIL 0"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: binsmasher-logs-${{ matrix.os }}
          path: |
            binsmasher*.log
            tests/bins/*.log
            *.log
          retention-days: 7

  release:
    name: Create Release (Cryptocalypse)
    needs: test
    if: startsWith(github.ref, 'refs/tags/cryptocalypse-')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create distribution ZIP
        run: |
          zip -r "binsmasher-${{ github.ref_name }}.zip" . \
            -x "*/.git/*" \
            -x "*/__pycache__/*" \
            -x ".venv/*" \
            -x "*.pyc"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BinSmasher - Cryptocalypse ${{ github.ref_name | replace('cryptocalypse-', '') }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          files: |
            binsmasher-${{ github.ref_name }}.zip
